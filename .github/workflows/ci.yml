name: CI Pipeline - Trading Forge System

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test_analyze:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Format Check (indentation, spacing)
        run: make format

      - name: Lint Check (style, best practices)
        run: make lint

      - name: Build, Test and Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          JwtSettings__Secret: ${{ secrets.JWT_SECRET }}
          AdminSettings__DefaultAdmins__0__Email: ${{ secrets.ADMIN_EMAIL }}
          AdminSettings__DefaultAdmins__0__Password: ${{ secrets.ADMIN_PASSWORD }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          dotnet sonarscanner begin \
            /k:"TradingForge" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.exclusions="TraderForge.Frontend/**,**/Migrations/**,Makefile" \
            /d:sonar.coverage.exclusions="**/DTOs/**,**/Requests/**,**/Responses/**,**/Program.cs,**/DependencyInjection.cs,**/*.Designer.cs" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"
          
          dotnet build TradingForgeSystem.sln --configuration Release
          
          dotnet test TradingForgeSystem.sln --no-build --configuration Release --verbosity normal \
            --collect:"XPlat Code Coverage;Format=opencover" \
            --results-directory:"TestResults"
          
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Integration Tests
        run: make test-integration

      - name: E2E API Tests
        run: make test-e2e
