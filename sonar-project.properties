sonar.projectKey=lukas-trillat-macalusso_Trading-Forge-System
sonar.organization=tradingforge-sonarqube-key
sonar.host.url=https://sonarcloud.io

# Exclude frontend entirely from Sonar scanning (if handled separately or not needed)
sonar.exclusions=TraderForge.Frontend/**

# Exclude specific patterns from code coverage calculation
sonar.coverage.exclusions=**/DTOs/**,**/Requests/**,**/Responses/**,**/Migrations/**,**/Program.cs,**/DependencyInjection.cs,**/*.Designer.cs

# Point to coverage report paths
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
