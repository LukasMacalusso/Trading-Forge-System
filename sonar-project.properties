# SonarCloud / SonarQube Configuration
sonar.projectKey=TradingForgeSystem
sonar.projectName=TradingForgeSystem

# Provide paths to source directories
sonar.sources=.
sonar.tests=Tests

# Ignore Frontend code if you have a separate Sonar project for it
sonar.exclusions=TraderForge.Frontend/**

# Exclude boilerplate C# files from Code Coverage calculations
# This ensures your coverage % isn't penalized by files that shouldn't be tested
sonar.coverage.exclusions=**/DTOs/**, **/Requests/**, **/Responses/**, **/Migrations/**, **/Program.cs, **/DependencyInjection.cs, **/*.Designer.cs

# Point Sonar to the Cobertura coverage reports generated by dotnet test
sonar.cs.opencover.reportsPaths=Tests/**/coverage.cobertura.xml
