services:
  db:
    image: postgres:16-alpine
    container_name: traderforge_postgres
    env_file:
      - docker.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: TraderForgeDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # 1. Add this healthcheck block
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TraderForgeDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: TraderForge.API/Dockerfile
    container_name: traderforge_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - docker.env
    ports:
      - "5000:8080"
    restart: unless-stopped

volumes:
  postgres_data:
